<ion-content>
  @if (products$ | async; as products) {
    @for (p of products; track p.id) {
      <ion-card>
        <img [src]="p.image" alt="">
        <ion-card-title>{{p.title}}</ion-card-title>
        <ion-card-subtitle>{{p.category}} | R${{p.price}}</ion-card-subtitle>
        <ion-card-content>{{p.description}}</ion-card-content>
      </ion-card>
    }
  }
  <ion-button routerDirection="back"></ion-button>
  <ion-button routerDirection="forward"></ion-button>
</ion-content>
